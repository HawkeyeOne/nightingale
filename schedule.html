<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Course | Nightingale RN Academy</title>
  <meta name="description" content="Request a Nightingale RN Academy course date using our quick scheduling form." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing:border-box; }
    html { background:#061a3a; }
    body {
      margin:0;
      min-height:100vh;
      font-family:Inter, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 85% 5%, rgba(231,181,81,0.16), transparent 30rem),
        linear-gradient(180deg,#061a3a,#0b2a5c);
    }
    .page { width:min(100% - 32px, 900px); margin:0 auto; padding:28px 0 56px; }
    .back {
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:44px;
      color:#e7b551;
      font-weight:600;
      text-decoration:none;
    }
    .back:hover { text-decoration:underline; }
    header { max-width:680px; margin:42px auto 28px; text-align:center; }
    h1 {
      margin:0 0 14px;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(42px, 8vw, 64px);
      line-height:1;
    }
    header p { margin:0; color:#cfd8ea; line-height:1.7; font-size:17px; }
    .form-card {
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:24px;
      box-shadow:0 24px 70px rgba(0,0,0,0.28);
    }
    iframe { display:block; width:100%; min-height:620px; border:0; }
    .help { margin:20px 0 0; color:#cfd8ea; text-align:center; font-size:14px; line-height:1.6; }
    .help a { color:#e7b551; }
    @media (max-width:600px) {
      .page { width:min(100% - 20px, 900px); padding-top:12px; }
      header { margin:26px 10px 22px; }
      header p { font-size:15px; }
      .form-card { border-radius:16px; }
      iframe { min-height:680px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html" aria-label="Return to the Nightingale RN Academy home page">← Back to courses</a>

    <header>
      <h1>Let’s find your course</h1>
      <p>Tell us what training you need and a little about your preferred schedule. We’ll follow up with availability and next steps.</p>
    </header>

    <section class="form-card" aria-label="Course scheduling form">
      <iframe
        data-tally-src="https://tally.so/embed/ja20bR?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="620"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Schedule a course with Nightingale RN Academy">
      </iframe>
    </section>

    <p class="help">Having trouble with the form? Call us at <a href="tel:17132817770">713-281-7770</a>.</p>
  </main>

  <script>
    var d=document,w="https://tally.so/widgets/embed.js",v=function(){
      if(typeof Tally!=="undefined"){Tally.loadEmbeds();}
      else{d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){e.src=e.dataset.tallySrc;});}
    };
    if(typeof Tally!=="undefined")v();
    else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w;s.onload=v;s.onerror=v;d.body.appendChild(s);}
  </script>
</body>
</html>
